name: CI

on:
  push:
    branches: [main, hol]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Check Cetacea corpus
        run: scripts/check_all.sh

      - name: Verify pre-HOL semantic baseline
        run: python3 scripts/hol_baseline.py check
